site_name: KacheController
site_url: 'https://funyin.github.io/KacheController/'

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    scheme: slate
    primary: deep purple
    accent: deep purple
  features:
    - navigation.prune
    - navigation.indexes
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - navigation.footer

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - social:
      enabled: !ENV [ENABLE_SOCIAL_CARDS, false]

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick_start.md
  - Cache Backends:
    - cache/index.md
    - Redis: cache/redis.md
    - In-Memory: cache/memory.md
    - SQLite: cache/sqlite.md
  - Database Adapters:
    - adapters/index.md
    - MongoDB: adapters/mongo.md
    - Exposed (SQL): adapters/exposed.md
  - Operations:
    - operations/index.md
    - Read: operations/read.md
    - Write: operations/write.md
    - Delete: operations/delete.md
    - Write-Behind: operations/write_behind.md
  - Keys & Volatiles: keys_and_volatiles.md
  - Why KacheController: why_how.md
  - Examples: examples/index.md
  - KDoc: https://funyin.github.io/KacheController/kdoc/KDOC_VERSION/
  - Roadmap: roadmap.md
  - Community:
    - community/index.md
    - Contributing: community/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/funyin/KacheController
  version:
    provider: mike
    default: latest

docs_dir: mkdocs-docs
edit_uri: edit/master/mkdocs-docs/
repo_url: https://github.com/funyin/KacheController
copyright: Copyright &copy; 2024 <a href="https://github.com/funyin">Funyinoluwa Kashimawo</a>
